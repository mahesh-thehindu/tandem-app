<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self';"
    />
    <title>Tandem</title>
    <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/browser.css" />
    <link rel="stylesheet" href="styles/terminal.css" />
    <link rel="stylesheet" href="styles/menu.css" />
  </head>
  <body>
    <!-- Unified title bar: window controls + mode switch + tabs in one row -->
    <header id="topbar">
      <div class="mode-switch" role="tablist" aria-label="Workspace">
        <button class="mode-btn is-active" data-mode="browser" role="tab" type="button">
          <svg viewBox="0 0 24 24" class="mode-ico" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          Browser
        </button>
        <button class="mode-btn" data-mode="terminal" role="tab" type="button">
          <svg viewBox="0 0 24 24" class="mode-ico" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M7 9l3 2.5L7 14M12.5 14.5H16" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Terminal
        </button>
        <button class="mode-btn" data-mode="code" role="tab" type="button">
          <svg viewBox="0 0 24 24" class="mode-ico" aria-hidden="true"><path d="M9 8l-4 4 4 4M15 8l4 4-4 4M13 5l-2 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Code
        </button>
      </div>

      <div class="topbar-divider"></div>

      <!-- Browser tabs (shown in Browser mode) -->
      <div class="tab-cluster" id="browser-tabcluster">
        <div class="chrome-tabs" id="chrome-tabs"></div>
        <button class="chrome-newtab" id="chrome-newtab" title="New tab (⌘T)" type="button">+</button>
        <button class="chrome-tabsearch" id="chrome-tabsearch" title="Search tabs" type="button">
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- Terminal session tabs (shown in Terminal mode) -->
      <div class="tab-cluster" id="terminal-tabcluster" hidden>
        <div class="warp-tabs" id="warp-tabs"></div>
        <button class="warp-newtab" id="warp-newtab" title="New session (⌘⇧T)" type="button">+</button>
      </div>

      <!-- Code workspace controls (shown in Code mode) -->
      <div class="tab-cluster" id="code-tabcluster" hidden>
        <button class="code-openbtn" id="code-open" type="button">
          <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          Open Folder
        </button>
        <span class="code-folder" id="code-folder">No folder open</span>
      </div>

      <div class="topbar-grow"></div>

      <!-- Terminal trailing actions -->
      <div class="topbar-trail" id="terminal-trail" hidden>
        <button class="warp-toolbtn" data-act="palette:open" title="Command palette (⌘P)" type="button">
          <svg viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M7 10l2.5 2L7 14M12 14h5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="warp-toolbtn" id="warp-menu-btn" title="Menu" type="button">
          <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <main id="stage">
      <!-- ============ BROWSER (Chromium-style) ============ -->
      <section id="browser-mode" class="mode" aria-label="Browser">
        <div class="chrome-toolbar">
          <div class="nav-cluster">
            <button class="cbtn" data-act="browser:back" title="Back" type="button">
              <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="cbtn" data-act="browser:forward" title="Forward" type="button">
              <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="cbtn" data-act="browser:reload" title="Reload" type="button">
              <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-.5 4M20 5v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="cbtn" data-act="browser:home" title="Home" type="button">
              <svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7M6 9.5V20h12V9.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <div class="omnibox">
            <span class="omni-lock" id="omni-lock" title="Connection">
              <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2" fill="currentColor"/><path d="M8 11V8a4 4 0 0 1 8 0v3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </span>
            <input id="omnibox-input" type="text" spellcheck="false" autocomplete="off"
                   placeholder="Search the web or enter an address" />
            <button class="omni-star" id="omni-star" data-act="browser:bookmark" title="Bookmark this tab" type="button">
              <svg viewBox="0 0 24 24"><path d="M12 4l2.3 4.7 5.2.8-3.8 3.7.9 5.2L12 16.7 7.4 18l.9-5.2L4.5 9.5l5.2-.8z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <div class="toolbar-actions">
            <span class="incognito-pill" id="incognito-pill" hidden>
              <svg viewBox="0 0 24 24"><path d="M5 14h14l-1.2-3.5a2 2 0 0 0-1.9-1.3H8.1a2 2 0 0 0-1.9 1.3z" fill="currentColor"/><circle cx="8" cy="17" r="2.4" fill="currentColor"/><circle cx="16" cy="17" r="2.4" fill="currentColor"/></svg>
              Incognito
            </span>
            <button class="cbtn dl-btn" id="downloads-btn" data-act="browser:downloads" title="Downloads" type="button">
              <svg viewBox="0 0 24 24"><path d="M12 4v10m0 0l-4-4m4 4l4-4M5 19h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span class="dl-badge" id="dl-badge" hidden></span>
            </button>
            <button class="cbtn" data-act="browser:history" title="History" type="button">
              <svg viewBox="0 0 24 24"><path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            </button>
            <button class="cbtn avatar" title="Profile" type="button">M</button>
            <button class="cbtn" id="chrome-menu-btn" title="Customize and control" type="button">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.7" fill="currentColor"/><circle cx="12" cy="12" r="1.7" fill="currentColor"/><circle cx="12" cy="19" r="1.7" fill="currentColor"/></svg>
            </button>
          </div>
        </div>

        <div class="bookmarks-bar" id="bookmarks-bar"></div>

        <div class="find-bar" id="find-bar" hidden>
          <input id="find-input" type="text" placeholder="Find in page" />
          <span class="find-count" id="find-count"></span>
          <button class="cbtn" id="find-prev" title="Previous" type="button">‹</button>
          <button class="cbtn" id="find-next" title="Next" type="button">›</button>
          <button class="cbtn" id="find-close" title="Close" type="button">✕</button>
        </div>

        <div class="webview-stack" id="webview-stack"></div>
      </section>

      <!-- ============ TERMINAL (Warp-style) ============ -->
      <section id="terminal-mode" class="mode is-hidden" aria-label="Terminal">
        <div class="warp-surface">
          <div class="warp-sessions" id="warp-sessions"></div>
        </div>
      </section>

      <!-- ============ CODE (real VS Code via code-server) ============ -->
      <section id="code-mode" class="mode is-hidden" aria-label="Code">
        <div class="code-stage" id="code-stage">
          <div class="code-empty" id="code-empty">
            <svg viewBox="0 0 24 24" class="code-empty-ico"><path d="M9 8l-4 4 4 4M15 8l4 4-4 4M13 5l-2 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <h2>Code</h2>
            <p>Open a folder to edit it with the full VS Code editor.</p>
            <button class="code-open-cta" id="code-open-2" type="button">Open Folder…</button>
            <span class="code-hint">Powered by code-server · runs locally</span>
          </div>
        </div>
      </section>
    </main>

    <!-- ============ Overlays ============ -->
    <div class="dropdown" id="chrome-menu" hidden></div>
    <div class="dropdown" id="warp-menu" hidden></div>
    <div class="dropdown" id="context-menu" hidden></div>

    <div class="palette-scrim" id="palette" hidden>
      <div class="palette">
        <input id="palette-input" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false" />
        <ul class="palette-list" id="palette-list"></ul>
      </div>
    </div>

    <div class="panel-scrim" id="panel" hidden>
      <div class="panel">
        <header class="panel-head">
          <h2 id="panel-title">Panel</h2>
          <button class="cbtn" id="panel-close" type="button">✕</button>
        </header>
        <div class="panel-body" id="panel-body"></div>
      </div>
    </div>

    <div class="md-scrim" id="md-viewer" hidden>
      <div class="md-card">
        <header class="md-head">
          <span class="md-doc">📄</span>
          <span class="md-title" id="md-title">Markdown</span>
          <button class="cbtn" id="md-close" type="button">✕</button>
        </header>
        <article class="md-body markdown-body" id="md-body"></article>
      </div>
    </div>

    <div class="toast" id="toast" hidden></div>

    <!-- xterm UMD globals load first (classic scripts), then our modules. -->
    <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="../../node_modules/@xterm/addon-search/lib/addon-search.js"></script>
    <script src="../../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
    <script src="../../node_modules/marked/lib/marked.umd.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
