<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d9bff"/>
      <stop offset="0.55" stop-color="#5ec8d8"/>
      <stop offset="1" stop-color="#4fd6b8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0b2233" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- squircle tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#sheen)"/>

  <!-- SVM wordmark -->
  <g filter="url(#soft)">
    <text x="512" y="566" text-anchor="middle"
          font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="340" letter-spacing="-14"
          fill="#0d1b2a">SVM</text>
  </g>

  <!-- terminal prompt line + cursor -->
  <g fill="#0d1b2a">
    <rect x="332" y="700" width="288" height="30" rx="15" opacity="0.92"/>
    <rect x="648" y="688" width="54" height="54" rx="13"/>
  </g>
</svg>
